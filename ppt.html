<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Feedback Form</title>
<style>

/* ===== RESET & BASE ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #eef1f8;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* ===== MAIN CARD ===== */
.card {
  background: #ffffff;
  border-radius: 16px;
  width: 100%;
  max-width: 780px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.10);
  overflow: hidden;
}

/* ===== HEADER ===== */
.card-header {
  padding: 28px 36px 0 36px;
}

.card-header h1 {
  font-size: 28px;
  font-weight: 800;
  color: #1a1a4e;
  margin-bottom: 4px;
}

/* ===== SLIDE BADGE (3/8 circle) ===== */
.badge {
  position: absolute;
  top: 24px;
  right: 30px;
  width: 48px;
  height: 48px;
  background: #00c2e0;
  border-radius: 50%;
  color: white;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.header-row {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 36px 0 36px;
}

/* ===== PROGRESS BAR ===== */
.progress-wrap {
  padding: 16px 36px 0 36px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-track {
  flex: 1;
  height: 14px;
  background: #dce3f5;
  border-radius: 20px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #00c2e0;
  border-radius: 20px;
  transition: width 0.4s ease;
}

.progress-label {
  font-size: 14px;
  font-weight: 700;
  color: #00c2e0;
  min-width: 40px;
  text-align: right;
}

/* ===== SECTION HEADER BAR ===== */
.section-bar {
  margin: 20px 36px 0 36px;
  padding: 14px 20px;
  border-radius: 10px 10px 0 0;
  color: white;
  font-size: 18px;
  font-weight: 700;
}

.bar-blue   { background: #5b6be8; }
.bar-purple { background: #9b3dbf; }
.bar-green  { background: #28a96a; }

/* ===== FORM FIELDS AREA ===== */
.fields-area {
  margin: 0 36px;
  background: #ffffff;
  border: 1.5px solid #e0e5f5;
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 24px 24px 28px 24px;
}

/* ===== INPUT FIELDS ===== */
.field-group {
  margin-bottom: 18px;
}

.field-group label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: #7b3fbf;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

input[type="text"],
input[type="email"],
select,
textarea {
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid #d0d8f0;
  border-radius: 8px;
  font-size: 15px;
  color: #555;
  background: #f5f7ff;
  outline: none;
  font-family: inherit;
  transition: border 0.2s;
  font-style: italic;
}

input[type="text"]:focus,
input[type="email"]:focus,
select:focus,
textarea:focus {
  border-color: #5b6be8;
  background: #fff;
  font-style: normal;
}

select { font-style: normal; cursor: pointer; }

textarea {
  resize: vertical;
  min-height: 80px;
}

/* ===== STAR RATING ===== */
.star-group { display: flex; flex-direction: row-reverse; justify-content: flex-start; gap: 4px; }
.star-group input { display: none; }
.star-group label {
  font-size: 36px;
  color: #e0e0e0;
  cursor: pointer;
  transition: color 0.15s;
}
.star-group input:checked ~ label,
.star-group label:hover,
.star-group label:hover ~ label { color: #f5a623; }

/* ===== NAVIGATION BUTTONS ===== */
.nav-row {
  display: flex;
  justify-content: space-between;
  padding: 20px 36px 32px 36px;
}

.btn-back {
  padding: 14px 36px;
  border-radius: 10px;
  border: none;
  background: #dce3f5;
  color: #7a88bb;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-back:hover { background: #c5d0ef; }

.btn-next {
  padding: 14px 36px;
  border-radius: 10px;
  border: none;
  background: #00c2e0;
  color: white;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}

.btn-next:hover { background: #00aac8; transform: scale(1.03); }

.btn-submit {
  padding: 14px 36px;
  border-radius: 10px;
  border: none;
  background: #28a96a;
  color: white;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-submit:hover { background: #1e8f58; }

/* ===== STEPS ===== */
.step { display: none; }
.step.active { display: block; }

/* ===== THANK YOU SCREEN ===== */
.thankyou-screen {
  display: none;
  background: #181845;
  min-height: 340px;
  border-radius: 14px;
  margin: 36px;
  padding: 60px 40px;
  text-align: center;
  border: 2px solid #00c2e0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.thankyou-screen.visible {
  display: flex;
}

.thankyou-screen h1 {
  font-size: 42px;
  font-weight: 800;
  color: #ffffff;
  margin-bottom: 20px;
}

.thankyou-screen p {
  font-size: 18px;
  color: #ccccdd;
  margin-top: 8px;
}

.thankyou-screen p.sub {
  font-size: 15px;
  color: #8888aa;
}

</style>
</head>
<body>

<div class="card" id="mainCard">

  <!-- ========== STEP 1: PERSONAL INFO ========== -->
  <div class="step active" id="step1">

    <div class="header-row">
      <h1>Step 1 — Personal Info</h1>
      <div class="badge">1/3</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" style="width: 33%"></div>
      </div>
      <div class="progress-label">33%</div>
    </div>

    <div class="section-bar bar-blue">Personal Info</div>

    <div class="fields-area">
      <div class="field-group">
        <input type="text" id="fullName" placeholder="Full Name">
      </div>
      <div class="field-group">
        <input type="email" id="email" placeholder="Email">
      </div>
      <div class="field-group">
        <input type="text" id="studentId" placeholder="Student ID">
      </div>
    </div>

    <div class="nav-row">
      <button class="btn-back" disabled style="opacity:0.4; cursor:default;">Back</button>
      <button class="btn-next" onclick="goTo(2)">Next →</button>
    </div>

  </div>

  <!-- ========== STEP 2: COURSE DETAILS ========== -->
  <div class="step" id="step2">

    <div class="header-row">
      <h1>Step 2 — Course Details</h1>
      <div class="badge">2/3</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" style="width: 66%"></div>
      </div>
      <div class="progress-label">66%</div>
    </div>

    <div class="section-bar bar-purple">Course Details</div>

    <div class="fields-area">
      <div class="field-group">
        <input type="text" id="courseName" placeholder="Course Name">
      </div>
      <div class="field-group">
        <input type="text" id="instructorName" placeholder="Instructor Name">
      </div>
      <div class="field-group">
        <label>Difficulty</label>
        <select id="difficulty">
          <option>Easy</option>
          <option selected>Moderate</option>
          <option>Hard</option>
        </select>
      </div>
      <div class="field-group">
        <label>Rating</label>
        <div class="star-group">
          <input type="radio" id="s5" name="rating" value="5"><label for="s5">★</label>
          <input type="radio" id="s4" name="rating" value="4" checked><label for="s4">★</label>
          <input type="radio" id="s3" name="rating" value="3"><label for="s3">★</label>
          <input type="radio" id="s2" name="rating" value="2"><label for="s2">★</label>
          <input type="radio" id="s1" name="rating" value="1"><label for="s1">★</label>
        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="btn-back" onclick="goTo(1)">Back</button>
      <button class="btn-next" onclick="goTo(3)">Next →</button>
    </div>

  </div>

  <!-- ========== STEP 3: FEEDBACK ========== -->
  <div class="step" id="step3">

    <div class="header-row">
      <h1>Step 3 — Feedback</h1>
      <div class="badge">3/3</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" style="width: 100%"></div>
      </div>
      <div class="progress-label">100%</div>
    </div>

    <div class="section-bar bar-green">Feedback</div>

    <div class="fields-area">
      <div class="field-group">
        <textarea id="liked" placeholder="What did you like?"></textarea>
      </div>
      <div class="field-group">
        <textarea id="suggestions" placeholder="Suggestions for improvement"></textarea>
      </div>
      <div class="field-group">
        <textarea id="comments" placeholder="Additional comments"></textarea>
      </div>
    </div>

    <div class="nav-row">
      <button class="btn-back" onclick="goTo(2)">Back</button>
      <button class="btn-submit" onclick="submitForm()">Submit ✓</button>
    </div>

  </div>

  <!-- ========== THANK YOU SCREEN ========== -->
  <div class="thankyou-screen" id="thankyou">
    <h1>🎉 Thank You!</h1>
    <p>Your feedback has been successfully submitted.</p>
    <p class="sub">We truly appreciate your time and effort 🙏</p>
  </div>

</div>

<script>
  // Navigate between steps
  function goTo(stepNumber) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    const target = document.getElementById('step' + stepNumber);
    if (target) target.classList.add('active');
  }

  // Submit and show Thank You screen
  function submitForm() {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('thankyou').classList.add('visible');
  }
</script>

</body>
</html>
