<!DOCTYPE html>
<html>
<head>
    <title>Responsive Page</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            animation: fadeIn 1s ease-in;
        }

        h1 {
            text-align: center;
            color: #333;
            transition: 0.3s;
        }

        h1:hover {
            color: teal;
            transform: scale(1.05);
        }

        /* multiple columns */
        .content {
            column-count: 2;
            column-gap: 20px;
            margin-top: 20px;
        }

        /* icons */
        .icons {
            text-align: center;
            margin-top: 30px;
        }

        .icons i {
            font-size: 30px;
            margin: 10px;
            color: #555;
            transition: 0.3s;
        }

        .icons i:hover {
            color: crimson;
            transform: rotate(15deg) scale(1.2);
        }

        /* animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* responsive */
        @media (max-width: 600px) {
            .content {
                column-count: 1;
            }
        }
    </style>
</head>

<body>

    <h1>My Simple Webpage</h1>

    <div class="content">
        <p>
            This is a simple example showing multiple columns in CSS. 
            The text adjusts based on screen size.
        </p>
        <p>
            CSS3 helps create responsive and interactive designs easily.
        </p>
    </div>

    <div class="icons">
        <i class="fas fa-heart"></i>
        <i class="fas fa-star"></i>
        <i class="fas fa-user"></i>
    </div>

</body>
</html>
