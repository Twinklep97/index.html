<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frames Example - Maps & External Pages</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            display: flex;
            height: 90vh;
        }
        .left {
            width: 30%;
            background: #ecf0f1;
            padding: 10px;
        }
        .right {
            width: 70%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        a {
            display: block;
            padding: 10px;
            margin: 5px 0;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

<header>
    <h1>HTML Frames Demo</h1>
    <p>Embedding Maps and External Web Pages using iframe</p>
</header>

<div class="container">
    
    <!-- Left Navigation -->
    <div class="left">
        <h3>Load Content</h3>
        <a href="https://www.wikipedia.org" target="contentFrame">Open Wikipedia</a>
        <a href="https://www.openai.com" target="contentFrame">Open OpenAI</a>
        <a href="https://www.google.com/maps" target="contentFrame">Open Google Maps</a>
    </div>

    <!-- Right Frame -->
    <div class="right">
        <iframe name="contentFrame" src="https://www.wikipedia.org"></iframe>
    </div>

</div>

</body>
</html>
