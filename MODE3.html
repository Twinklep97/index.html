<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b1220;
    color:white;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:#111b2e;
    padding:20px;
}

.sidebar h4{
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:#cbd5e1;
    text-decoration:none;
    margin:15px 0;
}

.sidebar a:hover{
    color:white;
}

/* MAIN */
.main{
    margin-left:260px;
    padding:20px;
}

/* CARDS */
.card-box{
    background:#111b2e;
    padding:20px;
    border-radius:15px;
}

/* SUBJECT */
.subject{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* STARS */
.rating i{
    color:#64748b;
    cursor:pointer;
}

.rating i.active{
    color:#facc15;
}

/* BUTTON */
.btn-main{
    background:#4f46e5;
    color:white;
}
.btn-main:hover{
    background:#4338ca;
}

/* RESPONSIVE */
@media(max-width:768px){
.sidebar{
    position:relative;
    width:100%;
    height:auto;
}
.main{
    margin-left:0;
}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h4>🎓 Feedback System</h4>
<a href="#">Dashboard</a>
<a href="#">Subjects</a>
<a href="#">Reports</a>
</div>

<!-- MAIN -->
<div class="main">

<h3>Student Feedback Dashboard</h3>

<!-- INPUTS -->
<div class="card-box mt-3">

<div class="row g-2">
<div class="col-md-6">
<input id="name" class="form-control" placeholder="Student Name">
</div>
<div class="col-md-6">
<input id="roll" class="form-control" placeholder="Roll No">
</div>
</div>

<div class="row g-2 mt-2">
<div class="col-md-4">
<select id="course" class="form-select">
<option>Select Course</option>
<option>BTech</option>
<option>BSc</option>
<option>BCom</option>
</select>
</div>

<div class="col-md-4">
<select id="branch" class="form-select"></select>
</div>

<div class="col-md-4">
<select id="sem" class="form-select">
<option>Semester</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
</select>
</div>
</div>

</div>

<!-- SUBJECTS -->
<div id="subjects" class="mt-4"></div>

<textarea id="feedback" class="form-control mt-3" placeholder="Overall Feedback"></textarea>

<button class="btn btn-main w-100 mt-3" onclick="submit()">Submit Feedback</button>

</div>

<script>

const data={
BTech:{
CSE:["DSA","DBMS","OS","CN"],
IT:["Web Dev","AI","Cloud"],
ECE:["Signals","Digital"],
},
BSc:{
Physics:["Quantum","Optics"],
Math:["Algebra","Calculus"]
},
BCom:{
General:["Accounting","Economics"]
}
};

/* COURSE */
course.onchange=()=>{
branch.innerHTML="<option>Select Branch</option>";
subjects.innerHTML="";

Object.keys(data[course.value]||{}).forEach(b=>{
branch.innerHTML+=`<option>${b}</option>`;
});
};

/* BRANCH */
branch.onchange=()=>{
let subs=data[course.value][branch.value];

let html="";
subs.forEach((s,i)=>{
html+=`
<div class="subject">
<div>📘 ${s}</div>

<div class="rating" data-i="${i}">
${[1,2,3,4,5].map(n=>`<i class="bi bi-star-fill" data-v="${n}"></i>`).join("")}
</div>

</div>`;
});

subjects.innerHTML=html;
stars();
};

/* STARS */
function stars(){
document.querySelectorAll(".rating").forEach(r=>{
let st=r.querySelectorAll("i");

st.forEach(s=>{
s.onclick=()=>{
let v=s.dataset.v;

st.forEach(x=>x.classList.remove("active"));
for(let i=0;i<v;i++) st[i].classList.add("active");

r.dataset.rate=v;
}
});
});
}

/* SUBMIT */
function submit(){
alert("Feedback Submitted Successfully ✔");

localStorage.setItem("feedback",JSON.stringify({
name:name.value,
roll:roll.value,
course:course.value,
branch:branch.value,
feedback:feedback.value
}));
}

</script>

</body>
</html>
